---
layout: main
---
<article class="article-page">
  {% if page.img %}
  <div class="page-cover-image">
    <figure>
      {% if page.img contains "://" %}
      <img class="page-image" src="{{ page.img }}" alt="{{ page.title }}">
      {% else %}
      <img class="page-image" src="{{ "/assets/img/" | relative_url | append: page.img }}" alt="{{ page.title }}">
      {% endif %}
      {% if page.fig-caption %}
      <figcaption>{{ page.fig-caption }}</figcaption>
      {% endif %}
    </figure>
  </div>
  {% endif %}
  <div class="wrap-content">
    <header class="header-page">
      <h1 class="page-title">{{ page.title }}</h1>
      <div class="page-date">{{ page.date | date: '%B %d, %Y' }}</div>
    </header>
    {{ content }}
    <div class="page-footer">
      <div class="page-share"></div>
      <div class="page-tag">
        {% for tag in page.tags %}
        <a href="{{ '/tags' | relative_url }}#{{ tag }}"># {{ tag }}</a>
        {% endfor %}
      </div>
    </div>
    {% include disqus.html %}
  </div>
</article>
