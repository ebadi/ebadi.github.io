<nav class="pagination">
  {% if paginator.previous_page %}
    {% if paginator.previous_page == 1 %}
    <a class="pagination-arrow" href="{{ '/' | relative_url }}"><i class="fa fa-long-arrow-left"></i> Newer</a>
    {% else %}
    <a class="pagination-arrow" href="{{ '/page/' | relative_url | append: paginator.previous_page | append: '/' }}"><i class="fa fa-long-arrow-left"></i> Newer</a>
    {% endif %}
  {% else %}
  <span class="pagination-arrow pagination-arrow--disabled"></span>
  {% endif %}

  {% if paginator.total_pages > 1 %}
  <span class="pagination-info">Page {{ paginator.page }} of {{ paginator.total_pages }}</span>
  {% endif %}

  {% if paginator.next_page %}
  <a class="pagination-arrow" href="{{ '/page/' | relative_url | append: paginator.next_page | append: '/' }}">Older <i class="fa fa-long-arrow-right"></i></a>
  {% else %}
  <span class="pagination-arrow pagination-arrow--disabled"></span>
  {% endif %}
</nav>
